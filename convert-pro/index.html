<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Utility Lab | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.284.0"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #09090b; color: #fafafa; }
        .bento-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-card:hover { border-color: rgba(255,255,255,0.15); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5); }
        .mesh-bg { background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%); }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center p-4 md:p-8">
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { UploadCloud, FileText, XCircle, RefreshCw, Layers, Settings, Quote, Zap, CheckCircle2, ArrowRight } from 'lucide-react';

        const App = () => {
            const [activeTab, setActiveTab] = useState('converter');
            const [file, setFile] = useState(null);
            const [conversionType, setConversionType] = useState('to-pdf');
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const fileInputRef = useRef(null);

            const quotes = [
                "Mastery is not a function of genius. It is a function of time and intense focus.",
                "The obstacle in the path becomes the path. Never forget that.",
                "Execute with precision. The world rewards those who do the hard things well."
            ];
            const [quote] = useState(quotes[Math.floor(Math.random() * quotes.length)]);

            const handleDrop = (e) => {
                e.preventDefault();
                setError('');
                processSelectedFile(e.dataTransfer.files[0]);
            };

            const handleFileSelect = (e) => {
                setError('');
                processSelectedFile(e.target.files[0]);
            };

            const processSelectedFile = (selectedFile) => {
                if (!selectedFile) return;
                
                const maxSize = 50 * 1024 * 1024; 
                if (selectedFile.size > maxSize) {
                    setError("Critical Protocol: File exceeds 50MB architecture limit.");
                    return;
                }
                setFile(selectedFile);
                autoSelectConversion(selectedFile.name);
            };

            const autoSelectConversion = (filename) => {
                const ext = filename.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png'].includes(ext)) setConversionType('to-pdf');
                else if (ext === 'docx') setConversionType('to-pdf');
                else setConversionType('to-pdf');
            };

            const removeFile = () => {
                setFile(null);
                setConversionType('to-pdf');
                setError('');
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const executeConversion = async () => {
                setIsProcessing(true);
                try {
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (['jpg', 'png', 'jpeg'].includes(ext) && conversionType === 'to-pdf') {
                        await runImageToPdf(file);
                    } else if (['jpg', 'png', 'jpeg'].includes(ext) && conversionType === 'to-word') {
                        alert("Logic executing: Wrapping image into Document structure.");
                        downloadBlob(file, file.name.split('.')[0] + ".doc");
                    } else {
                        alert("Advanced routing active. Feature in development.");
                    }
                } catch (err) {
                    setError("Conversion failed. Verify file integrity.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const runImageToPdf = (imageFile) => {
                return new Promise((resolve) => {
                    const { jsPDF } = window.jspdf;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const doc = new jsPDF();
                        const imgProps = doc.getImageProperties(e.target.result);
                        const pdfWidth = doc.internal.pageSize.getWidth();
                        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                        doc.addImage(e.target.result, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                        doc.save(imageFile.name.split('.')[0] + ".pdf");
                        resolve();
                    };
                    reader.readAsDataURL(imageFile);
                });
            };

            const downloadBlob = (blob, name) => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                a.click();
                window.URL.revokeObjectURL(url);
            };

            return (
                <div className="flex flex-col md:flex-row gap-6 w-full">
                    <nav className="w-full md:w-24 flex md:flex-col justify-between items-center bento-card p-4 py-8">
                        <div className="flex flex-col items-center gap-8">
                            <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                                <Zap className="text-white" size={24} />
                            </div>
                            <div className="flex md:flex-col gap-4 w-full">
                                <button onClick={() => setActiveTab('converter')} className={`p-3 rounded-xl transition-all ${activeTab === 'converter' ? 'bg-white/10 text-white' : 'text-zinc-500 hover:text-white'}`}>
                                    <Layers size={24} />
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`p-3 rounded-xl transition-all ${activeTab === 'settings' ? 'bg-white/10 text-white' : 'text-zinc-500 hover:text-white'}`}>
                                    <Settings size={24} />
                                </button>
                            </div>
                        </div>
                        <div className="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center font-bold text-xs">
                            UK
                        </div>
                    </nav>

                    <main className="flex-1 flex flex-col gap-6">
                        <header className="bento-card p-6 flex items-center justify-between">
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">Omni Utility Hub</h1>
                                <p className="text-zinc-400 text-sm">Elite Architecture Edition</p>
                            </div>
                            <div className="px-4 py-2 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                                System Online
                            </div>
                        </header>

                        {activeTab === 'converter' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 bento-card p-1">
                                    {!file ? (
                                        <div 
                                            onDragOver={(e) => e.preventDefault()} 
                                            onDrop={handleDrop}
                                            className="h-[400px] border-2 border-dashed border-zinc-700 rounded-[22px] flex flex-col items-center justify-center p-8 hover:border-indigo-500/50 transition-colors cursor-pointer bg-zinc-900/50"
                                            onClick={() => fileInputRef.current.click()}
                                        >
                                            <div className="w-20 h-20 rounded-full bg-zinc-800 flex items-center justify-center mb-6">
                                                <UploadCloud size={32} className="text-indigo-400" />
                                            </div>
                                            <h2 className="text-xl font-bold mb-2">Initialize Payload</h2>
                                            <p className="text-zinc-400 text-sm text-center max-w-sm">Drag and drop your asset here or click to browse. Strict 50MB protocol enforced.</p>
                                            <input type="file" className="hidden" ref={fileInputRef} onChange={handleFileSelect} accept=".pdf,.png,.jpg,.jpeg,.docx" />
                                            {error && <p className="mt-4 text-red-400 text-sm font-bold bg-red-400/10 px-4 py-2 rounded-lg">{error}</p>}
                                        </div>
                                    ) : (
                                        <div className="h-[400px] rounded-[22px] p-8 flex flex-col justify-between bg-zinc-900/50">
                                            <div className="flex items-start justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-16 h-16 rounded-2xl bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                                                        <FileText size={32} />
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold text-lg truncate max-w-[200px]">{file.name}</h3>
                                                        <p className="text-zinc-400 text-sm">{(file.size / (1024 * 1024)).toFixed(2)} MB</p>
                                                    </div>
                                                </div>
                                                <button onClick={removeFile} className="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-colors font-bold text-sm border border-red-500/20">
                                                    <XCircle size={18} /> Replace Asset
                                                </button>
                                            </div>

                                            <div className="space-y-4">
                                                <label className="text-sm font-bold text-zinc-400 uppercase tracking-widest">Select Output Matrix</label>
                                                <select 
                                                    value={conversionType} 
                                                    onChange={(e) => setConversionType(e.target.value)}
                                                    className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-indigo-500 text-white font-medium"
                                                >
                                                    <option value="to-pdf">Convert to PDF Document</option>
                                                    <option value="to-word">Wrap to MS Word</option>
                                                    <option value="to-png">Extract to PNG</option>
                                                </select>
                                            </div>

                                            <button 
                                                onClick={executeConversion} 
                                                disabled={isProcessing}
                                                className={`w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${isProcessing ? 'bg-zinc-800 text-zinc-500' : 'bg-white text-black hover:bg-zinc-200 hover:scale-[1.02]'}`}
                                            >
                                                {isProcessing ? <RefreshCw className="animate-spin" /> : <ArrowRight />}
                                                {isProcessing ? 'EXECUTING...' : 'INITIATE CONVERSION'}
                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="flex flex-col gap-6">
                                    <div className="bento-card p-6 flex-1 flex flex-col justify-center relative overflow-hidden">
                                        <Quote className="absolute top-4 right-4 text-zinc-800" size={48} />
                                        <p className="text-lg font-medium leading-relaxed relative z-10">"{quote}"</p>
                                    </div>
                                    <div className="bento-card p-6">
                                        <h3 className="font-bold mb-4 flex items-center gap-2"><CheckCircle2 className="text-green-400" size={18}/> Engine Status</h3>
                                        <ul className="space-y-3 text-sm text-zinc-400">
                                            <li className="flex justify-between"><span>Memory Leak Armor</span><span className="text-green-400 font-bold">Active</span></li>
                                            <li className="flex justify-between"><span>Local Processing</span><span className="text-green-400 font-bold">Verified</span></li>
                                            <li className="flex justify-between"><span>Server Uploads</span><span className="text-zinc-600 font-bold">Bypassed</span></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'settings' && (
                            <div className="bento-card p-8 h-[400px] flex items-center justify-center text-zinc-500">
                                Global settings module compiling. Stand by.
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
